name: Weekly Market Monitor

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: market_monitor
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run market monitor pipeline
        working-directory: market_monitor
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src.pipeline

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market_monitor public/market-monitor
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh market monitor outputs"
          git push origin main
